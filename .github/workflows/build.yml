name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  Build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: ['amd64']
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: WillAbides/setup-go-faster@v1.19.0
        with:
          go-version: 'stable'
      - name: Setup Env
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y
          bc gcc libgl1-mesa-dev libwayland-dev libx11-dev libxkbcommon-dev xorg-dev xvfb
      - name: Setup fyne
        run: go install github.com/fyne-io/fyne-cross@latest
      - name: Install UPX
        uses: crazy-max/ghaction-upx@v4
        with:
          install-only: true
      - name: Package
        run: fyne-cross windows -arch=${{ matrix.arch }}
      - name: Compress
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/dist
          unzip ${GITHUB_WORKSPACE}/fyne-cross/dist/windows-${{ matrix.arch }}/helium_updater.exe.zip -d ${GITHUB_WORKSPACE}/fyne-cross/dist/windows-${{ matrix.arch }}
          mv -f ${GITHUB_WORKSPACE}/fyne-cross/dist/windows-${{ matrix.arch }}/helium_updater.exe ${GITHUB_WORKSPACE}/dist/helium_updater.exe
          upx -9 ${GITHUB_WORKSPACE}/dist/helium_updater.exe
          zip -rj ${GITHUB_WORKSPACE}/dist/helium_updater-windows-${{ matrix.arch }}.zip ${GITHUB_WORKSPACE}/dist/helium_updater.exe
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.arch }}
          path: dist/helium_updater-windows-${{ matrix.arch }}.zip

  Release:
    needs: Build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
      - name: Generate Release Notes
        id: release_notes
        run: |
          echo "release_tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_notes.outputs.release_tag }}
          name: "Helium Updater ${{ steps.release_notes.outputs.release_tag }}"
          body: |
            ## Helium Updater ${{ steps.release_notes.outputs.release_tag }}
            
            自动构建发布。支持架构：
            - Windows amd64 (x64)
          files: artifacts/**/*